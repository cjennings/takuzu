<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Takuzu — Emblem Coinset Prototype</title><style>:root{color-scheme:dark}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0c0a07;color:#cbd0d6;font-family:ui-monospace,Menlo,Consolas,monospace}main{max-width:44rem;padding:2rem}h1{margin:0 0 .45rem;font-size:1rem}p{margin:0 0 1.2rem;color:#969385;font-size:.8rem;line-height:1.5}#rows{display:grid;gap:1rem}.row{display:grid;grid-template-columns:5rem auto;align-items:center;gap:.45rem}.size{color:#969385;font-size:.7rem;line-height:1.35}.row svg{display:block;overflow:visible}.labels{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:.3rem;color:#7c838a;font-size:9px;text-align:center}@keyframes breathe{0%,100%{opacity:.5}50%{opacity:1}}.breathe{animation:breathe 4.5s ease-in-out infinite}</style></head><body><main><h1>EMBLEM — live baseline</h1><p>Exact current Emblem grammar at 4×4–12×12 game sizes: nickel taijitu versus nickel gear, with their existing fixed-state treatments. Each row uses the live faceplate-fit calculation.</p><div id="rows"></div></main><script>
"use strict";
const C={ink:"#000000",socket:"#0c0a07",edge:"#05040a",white:"#fffffb",ivory:"#f3f1e8",silver:"#cbd0d6",nickelHi:"#bac1c8",nickelBase:"#8e919a",nickelDeep:"#4a4b4f",ironDeep:"#100f0f",ironHi:"#8e919a"};
const el=(t,a,x="")=>`<${t} ${Object.entries(a).map(([k,v])=>`${k}="${v}"`).join(" ")}>${x}</${t}>`,circle=(x,y,r,a)=>el("circle",{cx:x,cy:y,r,...a}),path=(d,a)=>el("path",{d,...a});
const pt=(x,y,r,d)=>{const a=(d-90)*Math.PI/180;return [+(x+r*Math.cos(a)).toFixed(2),+(y+r*Math.sin(a)).toFixed(2)]};
function grad(id){return el("linearGradient",{id,x1:0,y1:0,x2:1,y2:1},el("stop",{offset:0,"stop-color":C.nickelHi})+el("stop",{offset:.48,"stop-color":C.nickelBase})+el("stop",{offset:1,"stop-color":C.nickelDeep}))}
function yin(cx,cy,r,g,id){const rr=r*.72,hr=rr/2,p=cy-rr,q=cy+rr,base=g?C.ivory:C.ironDeep,half=g?C.ironDeep:C.ivory,face=path(`M ${cx} ${p} A ${rr} ${rr} 0 0 0 ${cx} ${q} A ${hr} ${hr} 0 0 0 ${cx} ${cy} A ${hr} ${hr} 0 0 1 ${cx} ${p} Z`,{fill:half,stroke:half,"stroke-width":.6})+circle(cx,(cy+q)/2,rr*.14,{fill:g?C.ivory:C.ironDeep})+circle(cx,(cy+p)/2,rr*.14,{fill:g?C.ironDeep:C.ivory});return circle(cx,cy,rr+2.1,{fill:"none",stroke:C.ink,"stroke-width":1})+circle(cx,cy,rr+0.8,{fill:"none",stroke:C.silver,"stroke-width":1})+circle(cx,cy,rr,{fill:base})+face}
function gearD(cx,cy,r,rotation=0){const root=r*.72,tip=r*.96,points=[];for(let i=0;i<8;i++){const a=i*45+rotation;points.push(pt(cx,cy,root,a-22.5),pt(cx,cy,root,a-15),pt(cx,cy,tip,a-9),pt(cx,cy,tip,a+9),pt(cx,cy,root,a+15),pt(cx,cy,root,a+22.5))}return `M ${points.map(p=>p.join(" ")).join(" L ")} Z`}
function gearBore(cx,cy,r,id){const b=r*.28,aperture=b*.62,lip=Math.max(.8,r*.075),wall=Math.max(.8,r*.065),bg=id+"bore";const grd=el("radialGradient",{id:bg,cx:.5,cy:.62,r:.6},el("stop",{offset:0,"stop-color":"#64708e"})+el("stop",{offset:.68,"stop-color":"#1b2230"})+el("stop",{offset:1,"stop-color":C.socket}));return grd+circle(cx,cy,b,{fill:"#050403",stroke:"#a4a9b1","stroke-width":lip})+circle(cx,cy,b*.76,{fill:"none",stroke:C.ironDeep,"stroke-width":lip})+path(`M ${cx-b*.88} ${cy-b*.34} A ${b*.95} ${b*.95} 0 0 1 ${cx-b*.28} ${cy-b*.90}`,{fill:"none",stroke:C.white,"stroke-opacity":.38,"stroke-width":Math.max(.55,r*.045),"stroke-linecap":"round"})+circle(cx,cy,aperture,{fill:`url(#${bg})`,stroke:C.ink,"stroke-width":.7})+path(`M ${cx+aperture*.16} ${cy+aperture*.99} A ${aperture} ${aperture} 0 0 0 ${cx+aperture*.99} ${cy+aperture*.16}`,{fill:"none",stroke:C.nickelBase,"stroke-opacity":.95,"stroke-width":wall,"stroke-linecap":"round"})}
function gear(cx,cy,r,g,id){const rot=g?22.5:0,d=Math.max(r*.03,1);const s=grad(id)+path(gearD(cx+d,cy+d,r,rot),{fill:C.nickelDeep})+path(gearD(cx,cy,r,rot),{fill:`url(#${id})`,stroke:C.ironDeep,"stroke-width":1});return s+gearBore(cx,cy,r,id)}
function floatGlow(cx,cy,r,id,col,cls){const gid=id+"glow";return el("radialGradient",{id:gid,cx:.5,cy:.5,r:.5},el("stop",{offset:0,"stop-color":col,"stop-opacity":.56})+el("stop",{offset:.55,"stop-color":col,"stop-opacity":.19})+el("stop",{offset:1,"stop-color":col,"stop-opacity":0}))+el("ellipse",{cx,cy:+(cy+r*.4).toFixed(2),rx:+(r*1.325).toFixed(2),ry:+(r*.975).toFixed(2),class:cls||"",fill:`url(#${gid})`})}
function coin(x,y,cell,val,g,id){const r=Math.round(cell*.37),cx=x+cell/2,cy=y+cell/2;const glow=floatGlow(cx,cy,r,id,val?"#cbd7e8":"#ffd9a8",val?"":"breathe");return el("rect",{x,y,width:cell,height:cell,rx:9,fill:C.socket,stroke:C.edge,"stroke-width":1})+glow+(val?gear(cx,cy,r,g,id):yin(cx,cy,r,g,id))}
const GAP=6,BPAD=14,PPAD=24,STAGE=16,PANEL=100,MINH=470,TITLE=78,LEGEND=64,EVENT=30,FILL=.85,cell=n=>n<=6?50:n<=8?44:n<=10?38:34,span=n=>2*BPAD+n*cell(n)+(n-1)*GAP;
function scale(n){const b=span(n),w=2*PPAD+Math.max(b+STAGE+PANEL,380),top=n>=8?PPAD+TITLE:PPAD+6,h=Math.max(PPAD+TITLE+b,top+MINH)+12+EVENT+14+LEGEND+PPAD;return Math.max(.4,FILL*Math.min(innerWidth/w,innerHeight/h))}
const rows=document.querySelector("#rows");function render(){rows.innerHTML=[4,6,8,10,12].map(n=>{const z=cell(n),r=Math.round(z*.37),w=4*z+3*GAP,s=scale(n),p=[coin(0,0,z,0,false,`y${n}u`),coin(z+GAP,0,z,0,true,`y${n}f`),coin(2*(z+GAP),0,z,1,false,`g${n}u`),coin(3*(z+GAP),0,z,1,true,`g${n}f`)].join("");return `<section class="row"><div class="size">${n}×${n}<br>${z}px · r${r}</div><div><svg viewBox="0 0 ${w} ${z}" width="${w*s}" height="${z*s}" xmlns="http://www.w3.org/2000/svg">${p}</svg><div class="labels" style="width:${w*s}px"><span>taijitu<br>user</span><span>taijitu<br>fixed</span><span>gear<br>user</span><span>gear<br>fixed</span></div></div></section>`}).join("")}render();addEventListener("resize",render);
</script></body></html>

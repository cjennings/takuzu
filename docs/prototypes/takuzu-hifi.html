<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Takuzu / Binairo — self-contained instrument-console prototype.
     A 1:1 port of the Emacs package's SVG faceplate (takuzu-ui.el): one SVG
     rebuilt per state change.  Engine (board rules, solver, grader, generator)
     lives in the #takuzu-engine script block, pure and DOM-free, so
     tests/run-html-parity.mjs can replay tests/fixtures/parity-cases.json
     against it.  Plays offline from file://. -->
<title>Takuzu — Instrument Console</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0b0a08; font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  #stage svg { display: block; }
  #echo {
    margin-top: 10px; min-height: 18px; font-size: 13px; color: #969385;
    text-align: center; padding: 0 12px;
  }
</style>
</head>
<body>
<div id="stage"></div>
<div id="echo" role="status" aria-live="polite"></div>

<script id="takuzu-engine">
"use strict";
/* Pure Takuzu engine — no DOM.  Mirrors takuzu-board.el, takuzu-solver.el,
   and takuzu-generator.el.  Cells are row-major arrays of null/0/1. */
var TakuzuEngine = (function () {

  const idx = (n, r, c) => r * n + c;
  const rowOf = (b, n, r) => { const a = []; for (let c = 0; c < n; c++) a.push(b[idx(n, r, c)]); return a; };
  const colOf = (b, n, c) => { const a = []; for (let r = 0; r < n; r++) a.push(b[idx(n, r, c)]); return a; };
  const allRows = (b, n) => { const a = []; for (let r = 0; r < n; r++) a.push(rowOf(b, n, r)); return a; };
  const allCols = (b, n) => { const a = []; for (let c = 0; c < n; c++) a.push(colOf(b, n, c)); return a; };
  const eqLine = (a, b) => a.length === b.length && a.every((v, i) => v === b[i]);

  // --- line rules ---

  function hasTriple(line) {
    for (let i = 0; i + 2 < line.length; i++) {
      const a = line[i];
      if (a != null && a === line[i + 1] && a === line[i + 2]) return true;
    }
    return false;
  }

  function countLegal(line, size) {
    const half = size / 2;
    let z = 0, o = 0;
    for (const v of line) { if (v === 0) z++; else if (v === 1) o++; }
    return z <= half && o <= half;
  }

  const lineComplete = line => line.every(v => v != null);

  function completeValid(line, size) {
    return lineComplete(line)
      && line.filter(v => v === 0).length === size / 2
      && !hasTriple(line);
  }

  // --- board rules ---

  function noDupCompleteLines(lines) {
    const seen = new Set();
    for (const l of lines) {
      if (!lineComplete(l)) continue;
      const k = l.join("");
      if (seen.has(k)) return false;
      seen.add(k);
    }
    return true;
  }

  function boardLegal(b, n) {
    const rows = allRows(b, n), cols = allCols(b, n);
    const linesLegal = ls => ls.every(l => !hasTriple(l) && countLegal(l, n));
    return linesLegal(rows) && linesLegal(cols)
      && noDupCompleteLines(rows) && noDupCompleteLines(cols);
  }

  const boardFull = b => b.every(v => v != null);

  function boardSolved(b, n) {
    if (!boardFull(b)) return false;
    const rows = allRows(b, n), cols = allCols(b, n);
    return rows.every(l => completeValid(l, n))
      && cols.every(l => completeValid(l, n))
      && noDupCompleteLines(rows) && noDupCompleteLines(cols);
  }

  // --- solver ---

  function uniqueAmong(line, lines) {
    let count = 0;
    for (const l of lines) if (lineComplete(l) && eqLine(l, line)) count++;
    return count === 1;
  }

  function placementOk(b, n, r, c) {
    const rr = rowOf(b, n, r), cc = colOf(b, n, c);
    if (hasTriple(rr) || !countLegal(rr, n)) return false;
    if (hasTriple(cc) || !countLegal(cc, n)) return false;
    if (lineComplete(rr) && !uniqueAmong(rr, allRows(b, n))) return false;
    if (lineComplete(cc) && !uniqueAmong(cc, allCols(b, n))) return false;
    return true;
  }

  function legalValues(b, n, r, c) {
    const out = [], i = idx(n, r, c);
    for (const v of [0, 1]) {
      b[i] = v;
      if (placementOk(b, n, r, c)) out.push(v);
      b[i] = null;
    }
    return out;
  }

  // Fill naked-single forced cells in place until fixpoint.
  function propagate(b, n) {
    let filled = 0, changed = true;
    while (changed) {
      changed = false;
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          const i = idx(n, r, c);
          if (b[i] == null) {
            const vals = legalValues(b, n, r, c);
            if (vals.length === 0) return "contradiction";
            if (vals.length === 1) { b[i] = vals[0]; filled++; changed = true; }
          }
        }
      }
    }
    return filled;
  }

  // Depth-first fill with propagation; branch order (0 1), or random per node.
  function solutions(b, n, limit, randomize) {
    if (limit <= 0 || !boardLegal(b, n)) return [];
    const snapshot = b.slice();
    let res = [];
    if (propagate(b, n) !== "contradiction") {
      const i = b.indexOf(null);
      if (i < 0) {
        if (boardSolved(b, n)) res = [b.slice()];
      } else {
        const r = Math.floor(i / n), c = i % n;
        const order = randomize && Math.random() < 0.5 ? [1, 0] : [0, 1];
        for (const v of order) {
          b[i] = v;
          if (placementOk(b, n, r, c))
            res = res.concat(solutions(b, n, limit - res.length, randomize));
          b[i] = null;
          if (res.length >= limit) break;
        }
      }
    }
    for (let k = 0; k < snapshot.length; k++) b[k] = snapshot[k];
    return res;
  }

  const countSolutions = (b, n, limit) => solutions(b.slice(), n, limit == null ? 2 : limit, false).length;
  const solve = (b, n) => solutions(b.slice(), n, 1, false)[0] || null;
  const isUnique = (b, n) => countSolutions(b, n, 2) === 1;

  // First empty cell with exactly one legal value, row-major, as [r, c, v].
  function forcedCell(b, n) {
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (b[idx(n, r, c)] == null) {
          const vals = legalValues(b, n, r, c);
          if (vals.length === 1) return [r, c, vals[0]];
        }
      }
    }
    return null;
  }

  // --- difficulty grader ---

  function forcedByHypothesis(b, n, r, c) {
    const survivors = [];
    for (const v of [0, 1]) {
      const trial = b.slice();
      trial[idx(n, r, c)] = v;
      if (placementOk(trial, n, r, c) && propagate(trial, n) !== "contradiction")
        survivors.push(v);
    }
    if (survivors.length === 0) return "contradiction";
    if (survivors.length === 1) return survivors[0];
    return null;
  }

  function hypothesisStep(w, n) {
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (w[idx(n, r, c)] == null) {
          const f = forcedByHypothesis(w, n, r, c);
          if (f === "contradiction") return false;
          if (f != null) {
            w[idx(n, r, c)] = f;
            propagate(w, n);
            return true;
          }
        }
      }
    }
    return false;
  }

  // Mirror of takuzu-next-hint: the next fillable cell and the technique that
  // found it, as [r, c, value, technique] with technique "forced",
  // "hypothesis", or "solution" (taken from solution when neither logic tier
  // names a cell).  Null when the board has no empty cell (or no technique
  // applies and solution is null).  b is unchanged.
  function nextHint(b, n, solution) {
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        if (b[idx(n, r, c)] == null) {
          const vals = legalValues(b, n, r, c);
          if (vals.length === 1) return [r, c, vals[0], "forced"];
        }
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        if (b[idx(n, r, c)] == null) {
          const f = forcedByHypothesis(b, n, r, c);
          if (f !== "contradiction" && f != null) return [r, c, f, "hypothesis"];
        }
    if (solution)
      for (let r = 0; r < n; r++)
        for (let c = 0; c < n; c++)
          if (b[idx(n, r, c)] == null)
            return [r, c, solution[idx(n, r, c)], "solution"];
    return null;
  }

  // easy: propagation alone solves; medium: depth-1 hypothesis; hard: neither.
  function grade(b, n) {
    const w = b.slice();
    propagate(w, n);
    if (boardFull(w)) return "easy";
    let progress = true;
    while (progress && !boardFull(w)) progress = hypothesisStep(w, n);
    return boardFull(w) ? "medium" : "hard";
  }

  // --- generator ---

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const fullSolution = n => solutions(new Array(n * n).fill(null), n, 1, true)[0] || null;

  function propagationSolves(b, n) {
    const w = b.slice();
    propagate(w, n);
    return boardFull(w);
  }

  // The tier bounds the carve: easy stops while propagation still solves it;
  // medium stays unique and no harder than medium; hard carves to minimal clues.
  function carveKeep(b, n, tier) {
    if (tier === "easy") return propagationSolves(b, n);
    if (tier === "medium") return isUnique(b, n) && ["easy", "medium"].includes(grade(b, n));
    return isUnique(b, n);
  }

  // Incremental carve so a caller can time-slice generation.
  function makeCarve(n, tier) {
    const solution = fullSolution(n);
    return {
      n, tier, solution,
      cells: solution.slice(),
      givens: new Array(n * n).fill(true),
      order: shuffle([...Array(n * n).keys()]),
      pos: 0,
    };
  }

  // Run carve steps until done or budgetMs elapses; null budget runs to completion.
  function carveStep(st, budgetMs) {
    const t0 = Date.now();
    while (st.pos < st.order.length) {
      const i = st.order[st.pos++];
      const v = st.cells[i];
      if (v != null) {
        st.cells[i] = null; st.givens[i] = false;
        if (!carveKeep(st.cells, st.n, st.tier)) {
          st.cells[i] = v; st.givens[i] = true;
        }
      }
      if (budgetMs != null && Date.now() - t0 >= budgetMs) break;
    }
    return st.pos >= st.order.length;
  }

  function carveResult(st) {
    return {
      size: st.n,
      cells: st.cells.slice(),
      givens: st.givens.slice(),
      solution: st.solution.slice(),
      grade: grade(st.cells, st.n),
    };
  }

  function generate(n, tier) {
    const st = makeCarve(n, tier);
    carveStep(st, null);
    return carveResult(st);
  }

  // --- fixture codecs ---

  const parseCells = s => Array.from(s, ch => ch === "0" ? 0 : ch === "1" ? 1 : null);
  const parseGivens = s => Array.from(s, ch => ch === "g");
  const cellsString = b => b.map(v => v == null ? "." : String(v)).join("");

  return {
    idx, rowOf, colOf, allRows, allCols,
    hasTriple, countLegal, lineComplete, completeValid,
    boardLegal, boardFull, boardSolved,
    legalValues, propagate, solutions, countSolutions, solve, isUnique,
    forcedCell, nextHint, grade,
    fullSolution, generate, makeCarve, carveStep, carveResult,
    parseCells, parseGivens, cellsString,
  };
})();
if (typeof module !== "undefined" && module.exports) module.exports = TakuzuEngine;
</script>

<script>
"use strict";
/* UI — the SVG faceplate, ported function-for-function from takuzu-ui.el. */
(function () {

const E = TakuzuEngine;

// --- palette (mirror of takuzu--colors; same key names) ---

const COLORS = {

  "plate": "#1b1710", "plate-edge": "#2c2620", "panel-edge": "#201d17",
  "screw": "#2b271f", "screw-slot": "#0c0a07",
  "well": "#0a0c0d", "board-bg": "#14110c", "socket": "#0c0a07", "socket-edge": "#05040a",
  // shared inks and metals
  "ink": "#000000", "white": "#ffffff", "shadow": "#00000055",
  "gold": "#b99640", "gold-hi": "#dcc061", "cream": "#f3e7c5",
  "steel": "#969385", "dim": "#7c838a", "fail": "#cb6b4d",

  "jewel-sapphire-hi": "#b8d8ff", "jewel-sapphire": "#3f82e3", "jewel-sapphire-deep": "#0b2c72",
  "jewel-ruby-hi": "#ffc0c7", "jewel-ruby": "#d83b58", "jewel-ruby-deep": "#700b25",
  // coin-skin metals (compass medallions) and the fixed-coin rim
  "coin-iron-hi": "#5a5f66", "coin-iron": "#33363b", "coin-iron-deep": "#1a1c20",

  "rim-silver": "#c3c9d1", "rim-iron": "#3a3e44",

  "amber": "#ff9a3c", "amber-off": "#3a2a1c", "amber-hi": "#ffbf7a",
  "tube-glass": "#0b0807", "tube-edge": "#2c261d", "tube-halo": "#ff8c32",

  "knob": "#1f1b17", "knob-edge": "#3a352c", "knob-shade": "#2a2622",

  "annunciator-off": "#141210", "annunciator-lit": "#a8843a",
  "annunciator-ink": "#1c1710", "annunciator-edge": "#262320",
  // jewels and state lamps
  "jewel-off": "#241f1b", "jewel-off-edge": "#0e0c0a",
  "lamp-green": "#6fce33", "lamp-amber": "#ffb43a", "lamp-cyan": "#63e6c8",
  // cursor: the machined brass bezel ring
  "cursor-bezel-hi": "#e8cd76", "cursor-bezel": "#b99640",
  "cursor-bezel-lo": "#7a5f24", "cursor-bezel-dk": "#57431a",
  "cursor-spark": "#fdf3c9",
  "cursor-iron-hi": "#d3d7dc", "cursor-iron": "#8a9097",
  "cursor-iron-lo": "#4a4f56", "cursor-iron-dk": "#2e3136",
  "cursor-iron-spark": "#eef2f6",
  // instructions spec plate
  "spec-silver": "#74787d", "spec-silver-hi": "#909498", "spec-silver-lo": "#52565b",
  "spec-ink": "#16181c", "spec-name-silver": "#9ba0a8",
};
const c = key => COLORS[key];

// Gradient stops of the cursor bezel's turned-metal catch, top-left to bottom-right.
const CURSOR_BEZEL_STOPS = [
  [0, "cursor-bezel-hi"], [0.30, "cursor-bezel"],
  [0.68, "cursor-bezel-lo"], [1, "cursor-bezel-dk"],
];

// the metal coin sets (jewel, compass) seat an iron cursor ring instead
const CURSOR_IRON_STOPS = [
  [0, "cursor-iron-hi"], [0.30, "cursor-iron"],
  [0.68, "cursor-iron-lo"], [1, "cursor-iron-dk"],
];

// --- layout constants (mirror of the takuzu-- layout defconsts) ---

const GAP = 6;             // pixels between board cells
const BPAD = 14;           // board inner padding
const PPAD = 24;           // faceplate padding
const STAGE_GAP = 16;      // gap between the board and the right panel
const PANEL_W = 100;       // right panel width
const PANEL_MIN_H = 470;   // minimum instrument-panel height (six frames)
const TITLE_H = 78;        // title band height
const LEGEND_H = 64;       // legend band height
const EVENT_H = 30;        // event annunciator strip height
const EVENT_TICK = 0.08;   // seconds between event-lamp pulse frames
const EVENT_BREATH = 2.8;  // seconds per breathing cycle
const EVENT_DUR = EVENT_BREATH; // one breath, then dark
const INVALID_HOLD = 2.0;  // seconds INVALID holds full brightness
const INVALID_FADE = 0.6;  // seconds INVALID takes to dim after the hold
const FILL = 0.85;         // fraction of the window the faceplate fills
const CHAR_ASPECT = 0.62;  // monospace glyph width / font size
const FLASH_PERIOD = 1.0;  // seconds per on/off cycle of the flashing New key
const SIZES = [4, 6, 8, 10, 12];
const DIFFS = ["easy", "medium", "hard"];
const DEFAULT_SIZE = 6;
const DEFAULT_DIFFICULTY = "easy";

const cellSize = n => n <= 6 ? 50 : n <= 8 ? 44 : n <= 10 ? 38 : 34;
const boardSpan = n => 2 * BPAD + n * cellSize(n) + (n - 1) * GAP;

// --- game state ---

const state = {
  board: null,        // {size, cells, givens}
  solution: null,     // cells array of the unique solution
  grade: null,
  size: DEFAULT_SIZE,
  cursor: [0, 0],
  assist: false,
  history: [],        // [index, prevValue] undo stack
  startTime: null,
  won: false,
  proven: false,
  wonElapsed: 0,
  status: "",
  event: null,
  eventTime: null,
  generating: null,   // {size, difficulty} while generating
  spinner: 0,
  armed: null,        // {size, difficulty} while waiting for the start key
  pending: null,      // pre-generated result awaiting the start key
  pendingStart: false,
  difficulty: null,
  help: false,
  coinSkin: "wood", // mirror of takuzu-coin-skin (coinset 1 is the default)
};

// a new skin is always appended at the tail -- existing positions never change
const COIN_SKINS = ["wood", "terra", "gestell", "plain"];

// --- the struck-metal engine (mirror of takuzu--coin-metal-tones etc.) ---

// every ramp drawn from the Dupre (WIP) theme palette, so the coins sit in
// the faceplate's own colour world (copper rides the terracotta ramp -- real
// copper is red-brown, not orange)
const COIN_METAL = {
  silver:   ["#edeff1", "#cbd0d6", "#a9b2bb", "#53575c"],
  nickel:   ["#dce0e3", "#bac1c8", "#8e919a", "#4a4b4f"],
  gold:     ["#eddba7", "#dab53d", "#ab8d2e", "#544412"],
  copper:   ["#cb8b7a", "#cb6b4d", "#a85b42", "#482c23"],
  iron:     ["#8e919a", "#606267", "#363638", "#100f0f"],
  bronze:   ["#e0c266", "#ab8d2e", "#7e671f", "#2d2306"],
  gunmetal: ["#788da6", "#54677d", "#303842", "#202327"],
  // the runic skin's woods ride the same table (mirror of the Elisp)
  oak:      ["#e7d3a4", "#cbaa6d", "#a17c46", "#513a1c"],
  walnut:   ["#a98a68", "#755837", "#4a3520", "#1f150b"],
  // Dupre ramps for the bimetal recolour (blue-1 body, olive/regal accents)
  blue:     ["#9ba8bb", "#788da6", "#54677d", "#303842"],
  olive:    ["#98ac86", "#809c50", "#627b2c", "#3f4c23"],
  regal:    ["#bea9dc", "#8255b5", "#6624a0", "#2f0c4e"],
  oxblood:  ["#b3676c", "#8f4046", "#6b2e33", "#331417"],
  // the collegiate pair's school colours, struck dark
  berkeley: ["#5d82ab", "#2b5484", "#00284f", "#001022"],
  calblue: ["#3f6ac9", "#1a47a3", "#002676", "#001647"],
  // The middle ring takes Stanford's relative lip step; inner shade seats blue.
  calgold: ["#f2d074", "#edb93c", "#ab852e", "#855c09"],
  cardinal: ["#d1686f", "#b83a4b", "#8c1515", "#820000"],
  coolgrey: ["#a6a9ae", "#7d8085", "#53565a", "#2e2f31"],
  // the wood skin's woods and gold
  beech:     ["#f0dfc4", "#ddc19a", "#c4a377", "#6b5133"],
  coal:      ["#6e6c68", "#454340", "#252422", "#0b0b0a"],
  sunflower: ["#ffe3a4", "#ffd274", "#ffc145", "#94691f"],
  // the filigree wheel's dark body
  pewter:    ["#9fa3a7", "#6e7276", "#494c50", "#232527"],
  // the casino chip's red
  chipred:   ["#cf6f66", "#b04137", "#932a22", "#45100c"],
};

// gem cuts for the gems skin (amethyst/topaz/aqua from the Dupre ramps)
const COIN_GEM = {
  ruby:     ["#e05a70", "#a81e3c", "#5c0f22"],
  sapphire: ["#6f8fd6", "#2b4d92", "#142a55"],
  emerald:  ["#5fc98e", "#1e7a4f", "#0d3d27"],
  diamond:  ["#ffffff", "#dfe9f0", "#9fb2c2"],
  amethyst: ["#9f80c9", "#6624a0", "#2f0c4e"],
  topaz:    ["#e0c266", "#ab8d2e", "#544412"],
  aqua:     ["#6ba9bd", "#0096b0", "#1d4049"],
};
const COIN_LIGHT = new Set(["silver", "nickel", "gold", "oak"]);
const mGlint = m => COIN_METAL[m][0], mHi = m => COIN_METAL[m][1];
const mBase = m => COIN_METAL[m][2], mDeep = m => COIN_METAL[m][3];
const mFixedInk = m => c(COIN_LIGHT.has(m) ? "rim-iron" : "rim-silver");
const timers = { refresh: null, event: null, spinner: null };
let genToken = 0;

function cancelTimer(name) {
  if (timers[name] != null) { clearInterval(timers[name]); timers[name] = null; }
}

const blankBoard = n => ({
  size: n,
  cells: new Array(n * n).fill(null),
  givens: new Array(n * n).fill(false),
});

const boardRef = (b, r, cc) => b.cells[r * b.size + cc];
const givenP = (b, r, cc) => b.givens[r * b.size + cc];

// --- helpers ---

function elapsed() {
  if (state.won || state.proven) return state.wonElapsed;
  if (state.startTime != null)
    return Math.floor((Date.now() - state.startTime) / 1000);
  return 0;
}

const flashOnP = () => (Date.now() / 1000) % FLASH_PERIOD < 0.5 * FLASH_PERIOD;
const refreshInterval = () => Math.max(0.2, Math.min(1.0, FLASH_PERIOD / 2));
// pegs at 99:99 once the minutes outgrow their two tubes, until a new game
const fmtTime = s => s > 5999 ? "99:99"
  : `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
const curP = (r, cc) => r === state.cursor[0] && cc === state.cursor[1];

function lineBadP(line, n, lines) {
  return E.hasTriple(line)
    || !E.countLegal(line, n)
    || (E.lineComplete(line)
        && lines.filter(l => E.lineComplete(l) && l.join(",") === line.join(",")).length > 1);
}

// Vector marking each index that lies in a rule-breaking line; null when assist is off.
function errorVector() {
  if (!state.assist) return null;
  const n = state.size;
  const bad = new Array(n * n).fill(false);
  const rows = E.allRows(state.board.cells, n);
  const cols = E.allCols(state.board.cells, n);
  for (let r = 0; r < n; r++)
    if (lineBadP(rows[r], n, rows))
      for (let cc = 0; cc < n; cc++) bad[r * n + cc] = true;
  for (let cc = 0; cc < n; cc++)
    if (lineBadP(cols[cc], n, cols))
      for (let r = 0; r < n; r++) bad[r * n + cc] = true;
  return bad;
}

const emptyCount = () => state.board.cells.filter(v => v == null).length;

function fillPct() {
  const total = state.size * state.size;
  return 100 * (total - emptyCount()) / total;
}

const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  for (const k in o) if (o[k] != null) out += ` ${k}="${o[k]}"`;
  return out;

const rect = (svg, x, y, w, h, o) => svg.push(`<rect x="${x}" y="${y}" width="${w}" height="${h}"${attrs(o)}/>`);

const ellipse = (svg, cx, cy, rx, ry, o) => svg.push(`<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"${attrs(o)}/>`);
const line = (svg, x1, y1, x2, y2, o) => svg.push(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"${attrs(o)}/>`);

// Mirror of takuzu--txt: monospace text at a size/color/anchor/weight.
function txt(svg, x, y, str, size, color, anchor, weight) {

// the point at DEG degrees (12 o'clock = 0) and radius RR around CX,CY
const coinPt = (cx, cy, rr, deg) => {
  const a = (deg - 90) * Math.PI / 180;
  return [+(cx + rr * Math.cos(a)).toFixed(2), +(cy + rr * Math.sin(a)).toFixed(2)];

// Define radial gradient ID once per build: objectBoundingBox fractions, so
// every coin that fills with the id gets it scaled to its own circle.
function ensureCoinGradient(svg, id, gcx, gcy, gr, stops) {
  if (!svg.coinGrads) svg.coinGrads = new Set();
  if (svg.coinGrads.has(id)) return;
  svg.coinGrads.add(id);
  svg.push(`<radialGradient id="${id}" cx="${gcx}" cy="${gcy}" r="${gr}">`
    + stops.map(([off, key]) => `<stop offset="${off}" stop-color="${c(key)}"/>`).join("")
    + `</radialGradient>`);

// Givens wear a thin dulled-silver bezel; placed discs a lighter lip of their colour.
function drawDiscTerra(svg, cx, cy, r, val, given) {
  const fill = val === 0 ? c("disc0") : c("disc1");
  const edge = val === 0 ? c("disc0-edge") : c("disc1-edge");
  if (given) {
    circle(svg, cx, cy, r + 1, { fill: "none", stroke: c("ink"), "stroke-width": 1 });
    circle(svg, cx, cy, r, { fill, stroke: c("bezel"), "stroke-width": 1.2 });

    circle(svg, cx, cy, r, { fill, stroke: edge, "stroke-width": 1.2 });

function ensureJewelGlow(svg, id, tone) {
  if (!svg.coinGrads) svg.coinGrads = new Set();

// A translucent octagonal sapphire/ruby jewel, lit from upper-left.  A fixed
// jewel wears a matching brass octagonal collar.
// Two different compass pieces, not two palettes (mirror of the Elisp):
// val 0 the dark-iron ray-rose medallion, val 1 a copper bearing dial with
// a tick ring, an N, and a two-tone needle swung north-east on a pivot.
// shared gradient defs, one per metal per svg build (mirror of
// takuzu--ensure-metal): a struck-field radial fill and a top-lit edge
function ensureMetal(svg, m) {
  if (!svg.metals) svg.metals = new Set();
  if (svg.metals.has(m)) return;
  svg.metals.add(m);
  svg.push(`<radialGradient id="m-${m}-fill" cx="0.34" cy="0.28" r="1.05">`
    + `<stop offset="0" stop-color="${mGlint(m)}"/>`
    + `<stop offset="0.22" stop-color="${mHi(m)}"/>`
    + `<stop offset="0.62" stop-color="${mBase(m)}"/>`
    + `<stop offset="1" stop-color="${mDeep(m)}"/>`
    + `</radialGradient>`
    + `<linearGradient id="m-${m}-edge" x1="0" y1="0" x2="0" y2="1">`
    + `<stop offset="0" stop-color="${mGlint(m)}"/>`
    + `<stop offset="0.5" stop-color="${mBase(m)}"/>`
    + `<stop offset="1" stop-color="${mDeep(m)}"/>`
    + `</linearGradient>`);

const mfill = m => `url(#m-${m}-fill)`;
const medge = m => `url(#m-${m}-edge)`;

function metalSheen(svg, cx, cy, r) {
  ellipse(svg, cx - r * 0.30, cy - r * 0.34, r * 0.34, r * 0.18,
    { fill: c("white"), "fill-opacity": 0.18 });
  ellipse(svg, cx - r * 0.38, cy - r * 0.42, r * 0.10, r * 0.055,
    { fill: c("white"), "fill-opacity": 0.55 });
}
function metalGivenRing(svg, cx, cy, r, m) {
  circle(svg, cx, cy, r + 1.5, { fill: "none", stroke: mFixedInk(m), "stroke-width": 1.6 });
  circle(svg, cx, cy, r + 2.6, { fill: "none", stroke: c("white"), "stroke-width": 0.5, "stroke-opacity": 0.3 });
}
function metalBlank(svg, cx, cy, r, m, given) {
  ensureMetal(svg, m);
  circle(svg, cx, cy, r, { fill: mfill(m), stroke: c("ink"), "stroke-width": 0.7, "stroke-opacity": 0.8 });
  circle(svg, cx, cy, r - r * 0.045, { fill: "none", stroke: medge(m), "stroke-width": r * 0.09 });
  circle(svg, cx, cy, r - r * 0.10, { fill: "none", stroke: mDeep(m), "stroke-width": 0.6, "stroke-opacity": 0.5 });
  // faint turning rings keep the field from reading as smooth plastic
  for (const k of [0.62, 0.40]) {
    circle(svg, cx, cy, r * k, { fill: "none", stroke: mDeep(m), "stroke-opacity": 0.22, "stroke-width": 0.6 });
    circle(svg, cx, cy, r * k - 0.8, { fill: "none", stroke: mGlint(m), "stroke-opacity": 0.12, "stroke-width": 0.5 });
  }
  metalSheen(svg, cx, cy, r);
  if (given) metalGivenRing(svg, cx, cy, r, m);
}

function drawRune(svg, cx, cy, u, rune, ink, hi2, rot) {
  const rad = rot * Math.PI / 180, co = Math.cos(rad), si = Math.sin(rad);
  const off = u * 0.07;
  for (const [x1, y1, x2, y2] of RUNIC_SEGMENTS[rune]) {

// carry the cream inlay bearing a spade in the chip's own colour,

const FILIGREE_GEMS = ["ruby", "sapphire", "emerald", "amethyst", "topaz", "aqua"];
// WOOD -- one-palette wood pair: every coin is a flat matte one-tone
// disc (all coal for 0, all beech for 1) with dots riding the band.
// No gradient field, no sheen, no heart, no holes, no pins.  Both
// coins wear a rim of their own wood one step lighter than the face,
// so it stays light on beech and dark on coal: thin on user coins, a
// wide bar on FIXED coins, widths floored in pixels so the fixed rim
// stays visible on every board size.
function drawDiscWood(svg, cx, cy, r, val, given) {
  const wood = val === 0 ? "coal" : "beech";
  const dots = val === 0 ? "sunflower" : "coal";
  circle(svg, cx, cy, r, { fill: mBase(wood), stroke: c("ink"), "stroke-width": 0.8, "stroke-opacity": 0.85 });
  if (given) {
    // the rim bar: flat, same wood, one step lighter; a crisp
    // glint-tone outer edge and a thin deep seat -- raised but
    // shallow, no trench
    const bw = Math.max(r * 0.19, 4), ew = Math.max(r * 0.02, 1);
    circle(svg, cx, cy, r - bw / 2, { fill: "none", stroke: mHi(wood), "stroke-width": bw });
    circle(svg, cx, cy, r - ew / 2, { fill: "none", stroke: mGlint(wood), "stroke-width": ew, "stroke-opacity": 0.9 });
    circle(svg, cx, cy, r - bw, { fill: "none", stroke: mDeep(wood), "stroke-width": ew, "stroke-opacity": 0.8 });
  } else {
    // the thin rim: the same flat band scaled down, with a faint seat
    // line so it still reads as raised
    const bw = Math.max(r * 0.06, 1.8);
    circle(svg, cx, cy, r - bw / 2, { fill: "none", stroke: mHi(wood), "stroke-width": bw });
    circle(svg, cx, cy, r - bw, { fill: "none", stroke: mDeep(wood), "stroke-width": 0.9, "stroke-opacity": 0.5 });
  }
  if (r >= 20) {
    const seg = (2 * Math.PI * r * 0.66) / 36;
    circle(svg, cx, cy, r * 0.66, {
      fill: "none", stroke: mBase(dots), "stroke-width": r * 0.05, "stroke-opacity": 0.9,
      "stroke-dasharray": `${(seg * 0.4).toFixed(2)} ${(seg * 0.6).toFixed(2)}`,
    });
  }
}

const image = (svg, x, y, w, h, href) => svg.push(`<image x="${x}" y="${y}" width="${w}" height="${h}" href="${href}"/>`);
function drawDiscGestell(svg, cx, cy, r, val, given) { const d = r * 2; image(svg, cx - r, cy - r, d, d, val === 0 ? SPRITE_GESTELL_0 : SPRITE_GESTELL_1); }
function drawDiscPlain(svg, cx, cy, r, val, given) { const d = r * 2; image(svg, cx - r, cy - r, d, d, val === 0 ? SPRITE_PLAIN_0 : SPRITE_PLAIN_1); }

const COIN_DRAWERS = {
  wood: drawDiscWood, terra: drawDiscTerra,
  gestell: drawDiscGestell, plain: drawDiscPlain,
};
function drawDisc(svg, cx, cy, r, val, given) {
  (COIN_DRAWERS[state.coinSkin] || drawDiscTerra)(svg, cx, cy, r, val, given);
}

// Mirror of takuzu--draw-skin-selector: the COIN frame's innards, centred on
// cx with the frame top at fy.  A tape counter shows the skin's index and a
// ridged thumbwheel names the key that turns it; no skin is named on the plate.
function drawSkinSelector(svg, cx, fy) {
  const pos = Math.max(0, COIN_SKINS.indexOf(state.coinSkin));
  const x0 = cx - 32, wx = x0 + 41, wy = fy + 10;
  rect(svg, x0, fy + 12, 36, 22, { rx: 3, fill: c("tube-glass"), stroke: c("tube-edge") });
  txt(svg, x0 + 18, fy + 28, String(pos + 1).padStart(2, "0"), 13, c("amber"), "middle");
  line(svg, x0 + 18, fy + 14, x0 + 18, fy + 32,
    { stroke: c("ink"), "stroke-width": 0.6, "stroke-opacity": 0.6 });
  rect(svg, x0 + 1.5, fy + 13.5, 33, 6, { rx: 2, fill: c("white"), "fill-opacity": 0.05 });
  rect(svg, wx, wy, 11, 26, { rx: 5, fill: c("knob"), stroke: c("knob-edge"), "stroke-width": 0.8 });
  for (let i = 0; i < 4; i++) {
    const ly = wy + 5 + i * 5.4;
    line(svg, wx + 1.5, ly, wx + 9.5, ly, { stroke: c("ink"), "stroke-opacity": 0.55, "stroke-width": 1 });
    line(svg, wx + 1.5, ly + 1, wx + 9.5, ly + 1, { stroke: c("white"), "stroke-opacity": 0.10, "stroke-width": 0.8 });
  }
  legendGlyph(svg, wx + 16, fy + 28, 10, "W", c("gold"), true);
}

// The cursor: a machined bezel ring seated on the socket rim, catching light
// from the top-left with a hard specular flash on that corner's arc.  The
// metal follows the coin set: brass with the original terra coins, polished
// iron with the jewel and compass sets.
function drawCursorBezel(svg, sx, sy, cell) {
  const g = "takuzu-cursor-bezel-g";
  const stops = state.coinSkin === "terra" ? CURSOR_BEZEL_STOPS : CURSOR_IRON_STOPS;
  // machined catch: brightest at the top-left, falling to shadowed metal
  svg.push(`<linearGradient id="${g}" gradientUnits="userSpaceOnUse" `
    + `x1="${sx}" y1="${sy}" x2="${sx + cell}" y2="${sy + cell}">`
    + stops.map(([off, key]) =>
        `<stop offset="${off}" stop-color="${c(key)}"/>`).join("")
    + `</linearGradient>`);
  // grounding shadow just outside the ring seats it on the plate
  rect(svg, sx - 2.2, sy - 2.2, cell + 4.4, cell + 4.4, {
    rx: 11, fill: "none", stroke: c("ink"),
    "stroke-width": 1.2, "stroke-opacity": 0.7,
  });
  // the turned ring, its stroke carrying the metal gradient
  rect(svg, sx - 0.8, sy - 0.8, cell + 1.6, cell + 1.6, {
    rx: 9.8, fill: "none", stroke: `url(#${g})`, "stroke-width": 3.2,
  });
  // a turning groove scored into the ring face
  rect(svg, sx - 0.8, sy - 0.8, cell + 1.6, cell + 1.6, {
    rx: 9.8, fill: "none", stroke: c("ink"),
    "stroke-width": 0.5, "stroke-opacity": 0.35,
  });
  // hard specular catch on the top-left corner arc
  pathEl(svg, `M ${sx - 0.8} ${sy + 9} A 9.8 9.8 0 0 1 ${sx + 9} ${sy - 0.8}`, {
    fill: "none",
    stroke: c(state.coinSkin === "terra" ? "cursor-spark" : "cursor-iron-spark"),
    "stroke-opacity": 0.9,
    "stroke-width": 1.4, "stroke-linecap": "round",
  });
  // polished inner lip where the ring meets the cup
  rect(svg, sx + 1.4, sy + 1.4, cell - 2.8, cell - 2.8, {
    rx: 7.8, fill: "none", stroke: c("white"),
    "stroke-width": 0.7, "stroke-opacity": 0.3,
  });
}

function drawBoard(svg, x, y) {
  const n = state.size, cell = cellSize(n);
  const span = boardSpan(n);
  const errs = errorVector();
  rect(svg, x, y, span, span, { rx: 12, fill: c("board-bg"), stroke: c("ink") });
  for (let r = 0; r < n; r++) {
    for (let cc = 0; cc < n; cc++) {
      const sx = x + BPAD + cc * (cell + GAP);
      const sy = y + BPAD + r * (cell + GAP);
      const i = r * n + cc;
      const val = boardRef(state.board, r, cc);
      const given = givenP(state.board, r, cc);
      const bad = errs && errs[i];
      rect(svg, sx, sy, cell, cell, {
        rx: 9, fill: c("socket"),
        stroke: bad ? c("fail") : c("socket-edge"),
        "stroke-width": bad ? 2 : 1,
      });
      if (curP(r, cc)) drawCursorBezel(svg, sx, sy, cell);
      if (val != null)
        drawDisc(svg, sx + cell / 2, sy + cell / 2, Math.round(cell * 0.37), val, given);
    }
  }
  return span;
}

// Glowing amber when lit, a dim ember when not.  The digit scales with h.
function drawNixieTube(svg, x, y, w, h, ch, lit) {
  rect(svg, x, y, w, h, { rx: 4, fill: c("tube-glass"), stroke: c("tube-edge") });
  const fs = Math.round(h * 0.62);
  if (lit) {
    ellipse(svg, x + w / 2, y + h * 0.52, w * 0.42, h * 0.34,
      { fill: c("tube-halo"), "fill-opacity": 0.16 });
    txt(svg, x + w / 2, Math.round(y + h * 0.72), ch, fs + 2, c("amber-hi"), "middle");
  }
  txt(svg, x + w / 2, Math.round(y + h * 0.72), ch, fs,
    lit ? c("amber") : c("amber-off"), "middle");
  rect(svg, x + 1.5, y + 1.5, w - 3, h * 0.28,
    { rx: 3, fill: c("white"), "fill-opacity": 0.05 });
}

// Engraved frame with the caption etched into a break in the top edge.
function drawFrame(svg, x, y, w, h, label) {
  rect(svg, x, y, w, h, { rx: 6, fill: "none", stroke: c("wash"), "stroke-width": 1 });
  const cx = x + w / 2;
  const lw = label.length * 7 + 8;
  rect(svg, Math.round(cx - lw / 2), y - 6, Math.round(lw), 12, { fill: c("well") });
  txt(svg, Math.round(cx), y + 3, label, 9, c("steel"), "middle");
}

// Two nixie tubes; a ghost 0 in the tens tube for single-digit sizes, and
// up/down chevrons hinting the size is adjustable (the s key).
function drawNixieSize(svg, cx, y, size) {
  const tw = 16, th = 23, g = 4;
  const s = String(size).padStart(2, "0");
  const x0 = Math.round(cx - 23);
  const ax = x0 + 2 * tw + g + 7;
  drawNixieTube(svg, x0, y, tw, th, s[0], size >= 10);
  drawNixieTube(svg, x0 + tw + g, y, tw, th, s[1], true);
  polygon(svg, [[ax, y + 3], [ax + 3, y + 9], [ax - 3, y + 9]], { fill: c("steel") });
  polygon(svg, [[ax, y + th - 1], [ax + 3, y + th - 7], [ax - 3, y + th - 7]], { fill: c("steel") });
}

function drawNixieTime(svg, cx, y) {
  const str = fmtTime(elapsed());
  const tw = 14, th = 23, g = 3, colw = 6;
  let total = 0;
  for (let i = 0; i < str.length; i++)
    total += (str[i] === ":" ? colw : tw) + (i > 0 ? g : 0);
  let x = cx - Math.floor(total / 2);
  for (let i = 0; i < str.length; i++) {
    if (i > 0) x += g;
    const ch = str[i];
    if (ch === ":") {
      txt(svg, Math.round(x + colw / 2), Math.round(y + th * 0.64), ":", 15, c("amber"), "middle");
      x += colw;
    } else {
      drawNixieTube(svg, Math.round(x), y, tw, th, ch, true);
      x += tw;
    }
  }
}

// Mirror of takuzu--draw-rotary-level: the LEVEL chicken-head selector.  The
// tapered bakelite lever is the indicator: its tip aims at the engraved level
// position, after the classic amp mode switch.
function drawRotaryLevel(svg, cx, cy) {
  const level = state.grade || state.difficulty;
  const specs = [["easy", "EASY", -46], ["medium", "MED", 0], ["hard", "HARD", 46]];
  const found = specs.find(s => s[0] === level);
  const ang = found ? found[2] : 0;
  const rot = `rotate(${ang} ${cx} ${cy})`;
  const rad = a => (a - 90) * Math.PI / 180;
  // position ticks + labels around the sweep
  for (const [lv, lab, deg] of specs) {
    const la = rad(deg);
    const lx = cx + 34 * Math.cos(la), ly = cy + 34 * Math.sin(la);
    const t1x = cx + 26 * Math.cos(la), t1y = cy + 26 * Math.sin(la);
    const t2x = cx + 23 * Math.cos(la), t2y = cy + 23 * Math.sin(la);
    const on = lv === level;
    line(svg, Math.round(t1x), Math.round(t1y), Math.round(t2x), Math.round(t2y),
      { stroke: c("steel"), "stroke-width": 1.2 });
    txt(svg, Math.round(lx), Math.round(ly + 3), lab, 7,
      on ? c("gold-hi") : c("steel"), "middle", on ? "bold" : null);
  }
  // skirt, then the lever aimed by a rotate transform about the pivot
  circle(svg, cx, cy, 10, { fill: c("knob"), stroke: c("knob-edge"), "stroke-width": 0.8 });
  pathEl(svg,
    `M ${cx} ${(cy - 22).toFixed(1)} L ${(cx + 6.5).toFixed(1)} ${(cy - 3).toFixed(1)} `
    + `Q ${(cx + 7).toFixed(1)} ${(cy + 6).toFixed(1)} ${(cx + 4).toFixed(1)} ${(cy + 8.5).toFixed(1)} `
    + `A 5.5 5.5 0 0 1 ${(cx - 4).toFixed(1)} ${(cy + 8.5).toFixed(1)} `
    + `Q ${(cx - 7).toFixed(1)} ${(cy + 6).toFixed(1)} ${(cx - 6.5).toFixed(1)} ${(cy - 3).toFixed(1)} Z`,
    { transform: rot, fill: c("knob-shade"), stroke: c("shadow"), "stroke-width": 0.7 });
  line(svg, cx, cy - 19, cx, cy + 5,
    { transform: rot, stroke: c("knob-edge"), "stroke-width": 1.4, "stroke-linecap": "round" });
}

// The needle sweeps left-to-right across the top by pct; value sits below.
function drawNeedleGauge(svg, cx, cy, r, pct, value) {
  pathEl(svg, `M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`,
    { fill: "none", stroke: c("wash"), "stroke-width": 2 });
  for (let i = 0; i <= 6; i++) {
    const th = (180 - i * 30) * Math.PI / 180;
    line(svg,
      Math.round(cx + r * Math.cos(th)), Math.round(cy - r * Math.sin(th)),
      Math.round(cx + (r - 5) * Math.cos(th)), Math.round(cy - (r - 5) * Math.sin(th)),
      { stroke: c("steel"), "stroke-width": 1 });
  }
  const th = (180 - (pct / 100) * 180) * Math.PI / 180;
  line(svg, cx, cy,
    Math.round(cx + (r - 4) * Math.cos(th)), Math.round(cy - (r - 4) * Math.sin(th)),
    { stroke: c("gold-hi"), "stroke-width": 2, "stroke-linecap": "round" });
  circle(svg, cx, cy, 4, { fill: c("gold") });
  txt(svg, cx, cy + 15, String(value), 12, c("cream"), "middle", "bold");
}

// Fixed-height framed instruments; leftover height spreads as even gaps.
function drawPanel(svg, x, y, h) {
  const w = PANEL_W, cx = x + Math.floor(w / 2);
  const fx = x + 8, fw = w - 16;
  const timeH = 44, sizeH = 46, levelH = 84, leftH = 62, coinH = 56, stateH = 78;
  const gap = (h - 12 - 8 - timeH - sizeH - levelH - leftH - coinH - stateH) / 5;
  let fy = y + 12;
  rect(svg, x, y, w, h, { rx: 10, fill: c("well"), stroke: c("panel-edge") });
  drawFrame(svg, fx, Math.round(fy), fw, timeH, "TIME");
  drawNixieTime(svg, cx, Math.round(fy) + 10);
  fy += timeH + gap;
  drawFrame(svg, fx, Math.round(fy), fw, sizeH, "SIZE");
  drawNixieSize(svg, cx, Math.round(fy) + 11, state.size);
  fy += sizeH + gap;
  drawFrame(svg, fx, Math.round(fy), fw, levelH, "LEVEL");
  drawRotaryLevel(svg, cx, Math.round(fy) + 48);
  fy += levelH + gap;
  drawFrame(svg, fx, Math.round(fy), fw, leftH, "LEFT");
  drawNeedleGauge(svg, cx, Math.round(fy) + 38, 28, fillPct(), emptyCount());
  fy += leftH + gap;
  drawFrame(svg, fx, Math.round(fy), fw, coinH, "COIN");
  drawSkinSelector(svg, cx, Math.round(fy));
  fy += coinH + gap;
  drawStateLamps(svg, fx, Math.round(fy), fw, (y + h) - 8 - Math.round(fy));
}

function drawJewel(svg, cx, cy, r, color, on) {
  if (on) {
    circle(svg, cx, cy, r + 3, { fill: color, "fill-opacity": 0.25 });
    circle(svg, cx, cy, r, { fill: color, stroke: c("shadow"), "stroke-width": 0.6 });
    circle(svg, Math.round(cx - r * 0.35), Math.round(cy - r * 0.35), Math.round(r * 0.4),
      { fill: c("white"), "fill-opacity": 0.6 });
  } else {
    circle(svg, cx, cy, r, { fill: c("jewel-off"), stroke: c("jewel-off-edge"), "stroke-width": 0.5 });
  }
}

// A proven (shown) board counts as solved -- the SOLVED lamp carries the
// failure in its colour instead of a separate SHOWN state.
function gameState() {
  if (state.armed) return "ready";
  if (state.won || state.proven) return "solved";
  return "solving";
}

// READY and SOLVED are steady.  SOLVING follows the flash cycle so the lamp
// blinks while a game is in play and goes dark once it ends.  SOLVED lights
// green on a win and red when the solution was proven instead -- a reveal is
// a failed solve.
function drawStateLamps(svg, x, y, w, h) {
  drawFrame(svg, x, y, w, h, "STATE");
  const st = gameState();
  const lamps = [
    ["READY", c("lamp-green"), st === "ready"],
    ["SOLVING", c("lamp-amber"), st === "solving" && flashOnP()],
    ["SOLVED", state.proven && !state.won ? c("fail") : c("lamp-green"), st === "solved"],
  ];
  const n = lamps.length, top = y + 16, bot = y + h - 12;
  const rowstep = (bot - top) / (n - 1);
  const jx = x + 22;
  lamps.forEach(([lab, col, on], i) => {
    const ly = Math.round(top + i * rowstep);
    drawJewel(svg, jx, ly, 6, col, on);
    txt(svg, jx + 13, ly + 3, lab, 7, on ? c("cream") : c("steel"), "start");
  });
}

// Seconds the current event lamp stays lit before the pulse timer clears it.
function eventDuration() {
  return state.event === "invalid" ? INVALID_HOLD + INVALID_FADE : EVENT_DUR;
}

// Pulse intensity 0..1 of the current event.  Most events breathe slowly over
// their elapsed time.  INVALID instead holds full brightness for INVALID_HOLD
// seconds and then dims over INVALID_FADE -- a steady warning, not a breath.
function eventIntensity() {
  if (state.eventTime == null) return 0;
  const e = (Date.now() - state.eventTime) / 1000;
  if (state.event === "invalid") {
    if (e < INVALID_HOLD) return 1.0;
    if (e < INVALID_HOLD + INVALID_FADE) return 1.0 - (e - INVALID_HOLD) / INVALID_FADE;
    return 0;
  }
  return 0.5 * (1 - Math.cos(2 * Math.PI * e / EVENT_BREATH));
}

function lerpColor(a, b, k) {
  const chan = (s, i) => parseInt(s.slice(1 + i * 2, 3 + i * 2), 16);
  const mix = i => Math.max(0, Math.min(255, Math.round(chan(a, i) + k * (chan(b, i) - chan(a, i)))));
  return "#" + [0, 1, 2].map(i => mix(i).toString(16).padStart(2, "0")).join("");
}

// Six momentary-event legends; the active one pulses like a warm lamp, then fades.
function drawEventAnnunciator(svg, x, y, w, h) {
  rect(svg, x, y, w, h, { rx: 10, fill: c("well"), stroke: c("panel-edge") });
  const events = [["fixed", "FIXED"], ["hint", "HINT"], ["no-hint", "NO HINT"],
                  ["invalid", "INVALID"], ["nothing", "NOTHING"], ["gen-fail", "GEN FAIL"]];
  const n = events.length, pad = 12, gap = 4;
  const cw = (w - 2 * pad - (n - 1) * gap) / n;
  const chh = h - 16, cy = y + 8;
  const k = eventIntensity();
  events.forEach(([ev, lab], i) => {
    const cx = x + pad + i * (cw + gap);
    const lit = ev === state.event ? k : 0;
    const bg = lerpColor(c("annunciator-off"), c("annunciator-lit"), lit);
    const fg = lerpColor(c("dim"), c("annunciator-ink"), lit);
    rect(svg, Math.round(cx), cy, Math.round(cw), Math.round(chh),
      { rx: 3, fill: bg, stroke: c("annunciator-edge") });
    txt(svg, Math.round(cx + cw / 2), Math.round(cy + chh / 2 + 3), lab, 8.5, fg, "middle", "bold");
  });
}

// --- legend ---

function legendGlyph(svg, cx, y, size, key, color, underline) {
  textEl(svg, cx, y, key, {
    "font-family": "monospace", "font-size": size, fill: color,
    "font-weight": underline ? "bold" : "normal",
    "text-decoration": underline ? "underline" : "none",
  });
}

function legendItemWidth(it, charw, kgap) {
  if (it[0] === "word" || it[0] === "flashword" || it[0] === "litword")
    return it[1].length * charw;
  return it[1].length * charw + kgap + it[2].length * charw;
}

// Items justified across width: (word W) first letter gold-underlined,
// (flashword W ON) flashing first letter, (litword W ON) label lit while on,
// (keyed K L) key underlined then label.
function drawLegendLine(svg, x, y, width, size, items) {
  const charw = size * CHAR_ASPECT, kgap = size * 0.4;
  const widths = items.map(it => legendItemWidth(it, charw, kgap));
  const n = items.length;
  const inter = n > 1
    ? Math.max(size * 0.9, (width - widths.reduce((a, b) => a + b, 0)) / (n - 1))
    : 0;
  let cx = x;
  items.forEach((it, i) => {
    if (it[0] === "word") {
      const w = it[1];
      legendGlyph(svg, cx, y, size, w[0], c("gold"), true);
      legendGlyph(svg, cx + charw, y, size, w.slice(1), c("dim"));
    } else if (it[0] === "flashword") {
      const w = it[1], on = it[2];
      legendGlyph(svg, cx, y, size, w[0], on ? c("gold-hi") : c("steel"), on);
      legendGlyph(svg, cx + charw, y, size, w.slice(1), c("dim"));
    } else if (it[0] === "litword") {
      const w = it[1], on = it[2];
      legendGlyph(svg, cx, y, size, w[0], c("gold"), true);
      legendGlyph(svg, cx + charw, y, size, w.slice(1), on ? c("lamp-cyan") : c("dim"));
    } else if (it[0] === "keyed") {
      const k = it[1], l = it[2];
      legendGlyph(svg, cx, y, size, k, c("gold"), true);
      legendGlyph(svg, cx + k.length * charw + kgap, y, size, l, c("dim"));
    }
    cx += widths[i] + inter;
  });
}

function drawEngrave(svg, x, y, width, label) {
  txt(svg, x, y, label, 9, c("steel"));
  line(svg, x + label.length * 7 + 12, y - 3, x + width, y - 3,
    { stroke: c("wash"), "stroke-width": 1 });
}

const stripWidth = () => boardSpan(state.size) + STAGE_GAP + PANEL_W;

// GAME (session keys) on top, PLAY (solving keys) below; New flashes while armed.
function drawLegend(svg, x, y, width) {
  const newItem = state.armed ? ["flashword", "NEW", flashOnP()] : ["word", "NEW"];
  drawEngrave(svg, x, y, width, "GAME");
  drawLegendLine(svg, x, y + 16, width, 10,
    [newItem, ["word", "RESET"], ["word", "SIZE"], ["word", "LEVEL"],
     ["word", "PROVE"], ["word", "INSTRUCTIONS"], ["word", "QUIT"]]);
  drawEngrave(svg, x, y + 36, width, "PLAY");
  drawLegendLine(svg, x, y + 52, width, 10,
    [["keyed", "SPC", "CYCLE"], ["word", "UNDO"], ["keyed", "?", "HINT"],
     ["word", "CHECK"], ["litword", "ASSIST", state.assist]]);
}

// --- faceplate geometry ---

const faceplateWidth = () => 2 * PPAD + Math.max(stripWidth(), 380);

// At sizes 8+ the panel starts at the board's top; smaller boards start it
// up in the title band so the instruments get more room.
const panelTop = () => state.size >= 8 ? PPAD + TITLE_H : PPAD + 6;

// The lower of the board and panel bottoms; small boards stretch the stage
// to keep the panel at PANEL_MIN_H and centre the board in the extra room.
const stageBottom = () => Math.max(
  PPAD + TITLE_H + boardSpan(state.size),
  panelTop() + PANEL_MIN_H);

const faceplateHeight = () =>
  stageBottom() + 12 + EVENT_H + 14 + LEGEND_H + PPAD;

// Mirror of takuzu--svg: the whole faceplate for the current state.
function svgFaceplate() {
  const boardw = boardSpan(state.size);
  const w = faceplateWidth();
  const stagey = PPAD + TITLE_H;
  const bottom = stageBottom();
  const boardy = stagey + Math.floor((bottom - stagey - boardw) / 2);
  const h = faceplateHeight();
  const svg = [];
  drawFaceplateShell(svg, w, h);
  drawBoard(svg, PPAD, boardy);
  const px = PPAD + boardw + STAGE_GAP;
  const ptop = panelTop();
  drawPanel(svg, px, ptop, bottom - ptop);
  const evy = bottom + 12;
  drawEventAnnunciator(svg, PPAD, evy, stripWidth(), EVENT_H);
  drawLegend(svg, PPAD, evy + EVENT_H + 14, w - 2 * PPAD);
  return { w, h, body: svg.join("") };
}

// --- generating overlay ---

const SPINNER_FRAMES = ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"];

function svgGenerating() {
  const w = faceplateWidth(), h = faceplateHeight();
  const svg = [];
  const diff = state.generating.difficulty, n = state.generating.size;
  const frame = SPINNER_FRAMES[state.spinner % SPINNER_FRAMES.length];
  drawFaceplateShell(svg, w, h);
  txt(svg, Math.floor(w / 2), Math.floor(h / 2) - 4, frame, 48, c("gold"), "middle");
  txt(svg, Math.floor(w / 2), Math.floor(h / 2) + 36,
    `generating a ${diff} ${n}×${n} puzzle…`, 13, c("dim"), "middle");
  return { w, h, body: svg.join("") };
}

// --- help overlay: the brushed-silver spec plate ---

const RULES = [
  ["No three cells of the same colour", "may sit adjacent in a row or column."],
  ["Each row and each column must hold", "an equal number of both colours."],
  ["No two rows may be identical, and", "no two columns may be identical."],
];

// Etched text: a light lower highlight then dark ink on top.
function helpEtch(svg, x, y, str, size, anchor, ink, hi, weight) {
  textEl(svg, x, y + 1, str, {
    "font-family": "monospace", "font-size": size, fill: hi, "fill-opacity": 0.5,
    "text-anchor": anchor, "font-weight": weight || "normal",
  });
  textEl(svg, x, y, str, {
    "font-family": "monospace", "font-size": size, fill: ink,
    "text-anchor": anchor, "font-weight": weight || "normal",
  });
}

function helpDivider(svg, x1, x2, y, ink, hi) {
  line(svg, x1, y + 1, x2, y + 1, { stroke: hi, "stroke-opacity": 0.5 });
  line(svg, x1, y, x2, y, { stroke: ink, "stroke-opacity": 0.55 });
}

// Brushed-silver plate with sheen bands and corner rivets.
function helpPlate(svg, x, y, w, h) {
  const base = c("spec-silver"), light = c("spec-silver-hi");
  const dark = c("spec-silver-lo"), edge = c("plate-edge");
  rect(svg, x, y, w, h, { rx: 9, fill: base, stroke: edge, "stroke-width": 1.4 });
  // a light wash fading down from the top, a shadow deepening toward the bottom
  const bands = 26, bh = 1.0 + h / bands;
  for (let i = 0; i < bands; i++) {
    const frac = i / bands, by = y + frac * h;
    rect(svg, x + 3, by, w - 6, bh, { fill: light, "fill-opacity": 0.45 * (1 - frac) });
    rect(svg, x + 3, by, w - 6, bh, { fill: dark, "fill-opacity": 0.40 * frac });
  }
  for (let yy = y + 6; yy <= y + h - 6; yy += 2)
    line(svg, x + 6, yy, x + w - 6, yy, { stroke: c("white"), "stroke-opacity": 0.04 });
  rect(svg, x + 8, y + 8, w - 16, h - 16,
    { rx: 6, fill: "none", stroke: edge, "stroke-opacity": 0.4 });
  for (const [px, py] of [[x + 16, y + 16], [x + w - 16, y + 16],
                          [x + 16, y + h - 16], [x + w - 16, y + h - 16]]) {
    circle(svg, px, py, 3.4, { fill: light, stroke: edge, "stroke-width": 0.9 });
    circle(svg, px - 1, py - 1, 1.2, { fill: c("white"), "fill-opacity": 0.7 });
  }
}

function helpEmblem(svg, cx, cy, kind, ink, hi) {
  if (kind === "ce") {
    helpEtch(svg, cx, cy + 4, "CE", 13, "middle", ink, hi, "bold");
  } else if (kind === "class2") {
    rect(svg, cx - 9, cy - 9, 18, 18, { fill: "none", stroke: ink, "stroke-opacity": 0.7 });
    rect(svg, cx - 6, cy - 6, 12, 12, { fill: "none", stroke: ink, "stroke-opacity": 0.7 });
    helpEtch(svg, cx, cy + 4, "II", 10, "middle", ink, hi, "bold");
  } else if (kind === "warn") {
    polygon(svg, [[cx, cy - 9], [cx + 9, cy + 7], [cx - 9, cy + 7]],
      { fill: "none", stroke: ink, "stroke-opacity": 0.7, "stroke-linejoin": "round" });
    helpEtch(svg, cx, cy + 6, "!", 11, "middle", ink, hi, "bold");
  }
}

const helpDisc = (svg, cx, cy, r, fill) =>
  circle(svg, cx, cy, r, { fill, stroke: c("shadow"), "stroke-width": 0.8 });

// The diagram for each rule stays in a narrow left column beside the text.
function helpRuleWidget(svg, x, y, kind, d0, d1, fail) {
  const r = 5, g = 13;
  if (kind === 1) {
    for (let i = 0; i < 3; i++) helpDisc(svg, x + i * g, y, r, d1);
    line(svg, x - 7, y + 7, x + 2 * g + 7, y - 7,
      { stroke: fail, "stroke-width": 2.4, "stroke-linecap": "round" });
  } else if (kind === 2) {
    // a legal row with equal counts and no triple; six discs start 12 left so
    // the row's centre lines up with the three-disc rows
    const row = [d0, d0, d1, d1, d0, d1], r2 = 4, g2 = 10;
    for (let i = 0; i < 6; i++) helpDisc(svg, x - 12 + i * g2, y, r2, row[i]);
  } else if (kind === 3) {
    const top = [d1, d0, d1], bot = [d0, d1, d0];
    for (let i = 0; i < 3; i++) helpDisc(svg, x + i * g, y - 7, r, top[i]);
    for (let i = 0; i < 3; i++) helpDisc(svg, x + i * g, y + 7, r, bot[i]);
  }
}

// Flat black print; only the name is embossed silver, raised off the plate.
// Each layer is one text element of three tspans, so the browser computes the
// exact advances and the comma hugs the name (a per-segment CHAR_ASPECT
// estimate left a stray gap before it).
function drawHelpDedication(svg, cx, y) {
  const size = 10;
  const pre = "Dedicated to ", name = "Christine Ciarmello";
  const post = ", with thanks for the inspiration.";
  const silver = c("spec-name-silver");
  // pre/post ride along transparent in the emboss layers to keep the advance
  const layer = (yy, nameFill, nameOpacity, edgeOpacity) => svg.push(
    `<text x="${cx}" y="${yy}" font-family="monospace" font-size="${size}"`
    + ` text-anchor="middle">`
    + `<tspan fill="${c("ink")}"${edgeOpacity != null ? ` fill-opacity="${edgeOpacity}"` : ""}>${esc(pre)}</tspan>`
    + `<tspan fill="${nameFill}"${nameOpacity != null ? ` fill-opacity="${nameOpacity}"` : ""} font-weight="bold">${esc(name)}</tspan>`
    + `<tspan fill="${c("ink")}"${edgeOpacity != null ? ` fill-opacity="${edgeOpacity}"` : ""}>${esc(post)}</tspan>`
    + `</text>`);
  layer(y + 1, c("ink"), 0.6, 0);
  layer(y - 1, c("white"), 0.85, 0);
  layer(y, silver, null, null);
}

// The spec-plate card: frame, plate, header, rules with diagrams, compliance
// footer, and dedication.  All offsets relative to the box; callers scale it.
function drawHelpCard(svg, x, y, w, h, ink, hi, d0, d1, fail) {
  const lx = x + 26, rx = x + w - 26, cx = x + w / 2;
  const wx = lx + 20, tx = lx + 80;
  // faceplating: an engraved frame the plate is set into
  rect(svg, x - 6, y - 6, w + 12, h + 12,
    { rx: 13, fill: "none", stroke: c("plate-edge"), "stroke-width": 1.2 });
  helpPlate(svg, x, y, w, h);
  // header
  helpEtch(svg, lx, y + 40, "TAKUZU", 26, "start", ink, hi, "bold");
  helpEtch(svg, rx, y + 45, "MODEL TKZ-06", 11, "end", ink, hi);
  helpEtch(svg, rx, y + 60, "SERIAL 2026-0711-CJ", 10, "end", ink, hi);
  helpEtch(svg, lx, y + 60, "BINAIRO  -  TOHU WA-VOHU  -  BINARY LOGIC", 10, "start", ink, hi);
  helpDivider(svg, lx, rx, y + 76, ink, hi);
  // footer, anchored to the bottom
  helpDivider(svg, lx, rx, y + h - 100, ink, hi);
  const ey = y + h - 78;
  helpEmblem(svg, lx + 12, ey, "ce", c("ink"), c("ink"));
  helpEmblem(svg, lx + 52, ey, "class2", c("ink"), c("ink"));
  helpEmblem(svg, lx + 92, ey, "warn", c("ink"), c("ink"));
  txt(svg, rx, ey - 4, "CONFORMS TO BINARY-LOGIC STANDARD 3", 10, c("ink"), "end");
  txt(svg, rx, ey + 10, "CLASS II  -  SIZES 4 TO 12  -  ONE SOLUTION", 10, c("ink"), "end");
  txt(svg, lx, y + h - 50, "MADE IN NEW ORLEANS, LA, USA  -  (c) CRAIG JENNINGS 2026", 10, c("ink"), "start");
  drawHelpDedication(svg, cx, y + h - 26);
  // rules block, centred between the two dividers
  const rtop = y + 92, rbot = y + h - 112, blockh = 165;
  const y0 = rtop + Math.max(0, Math.floor((rbot - rtop - blockh) / 2));
  txt(svg, lx, y0, "HOW TO PLAY", 12, c("ink"), "start", "bold");
  txt(svg, lx, y0 + 18, "Fill the grid with two colours so that:", 11, c("ink"), "start");
  let ry = y0 + 50;
  RULES.forEach((rule, i) => {
    helpRuleWidget(svg, wx, ry + 5, i + 1, d0, d1, fail);
    txt(svg, tx, ry, rule[0], 12, c("ink"), "start");
    txt(svg, tx, ry + 17, rule[1], 12, c("ink"), "start");
    ry += 48;
  });
}

const HELP_CARD_W = 452;   // natural card size before scaling
const HELP_CARD_H = 438;
const HELP_CARD_FRAC = 0.8; // card width as a fraction of the faceplate width

// Border and screws match the board view so they never move; the board,
// instruments, and title give way to a large plate centred in the faceplate.
function svgHelp() {
  const w = faceplateWidth(), h = faceplateHeight();
  const svg = [];
  const ink = c("spec-ink"), hi = c("white");
  const d0 = c("disc0"), d1 = c("disc1"), fail = c("fail");
  const cw = HELP_CARD_W, ch = HELP_CARD_H;
  const s = (HELP_CARD_FRAC * w) / cw;
  const gx = Math.round((w - cw * s) / 2);
  const gy = Math.round((h - ch * s) / 2);
  drawFaceplateShell(svg, w, h, true);
  const card = [];
  drawHelpCard(card, 0, 0, cw, ch, ink, hi, d0, d1, fail);
  svg.push(`<g transform="translate(${gx} ${gy}) scale(${s})">${card.join("")}</g>`);
  return { w, h, body: svg.join("") };
}

// --- rendering ---

const stageEl = document.getElementById("stage");
const echoEl = document.getElementById("echo");

function fitStage(w, h) {
  const scale = Math.max(0.4, FILL * Math.min(window.innerWidth / w, window.innerHeight / h));
  const el = stageEl.firstElementChild;
  if (el) { el.style.width = (w * scale) + "px"; el.style.height = (h * scale) + "px"; }
}

function redraw() {
  const view = state.help ? svgHelp()
    : state.generating ? svgGenerating()
    : svgFaceplate();
  stageEl.innerHTML =
    `<svg viewBox="0 0 ${view.w} ${view.h}" xmlns="http://www.w3.org/2000/svg" `
    + `role="img" aria-label="Takuzu console">${view.body}</svg>`;
  fitStage(view.w, view.h);
}

// The echo area stands in for Emacs' `message'.
function message(msg) { echoEl.textContent = msg; }

// --- game actions ---

// A non-empty message with no lamp of its own is echoed instead, so the
// keypress still gives visible feedback.
function setStatus(msg, event) {
  state.status = msg;
  signalEvent(event || null);
  if (!event && msg !== "") message(msg);
}

function signalEvent(event) {
  cancelTimer("event");
  if (event == null) {
    state.event = null; state.eventTime = null;
  } else {
    state.event = event; state.eventTime = Date.now();
    timers.event = setInterval(eventPulse, EVENT_TICK * 1000);
  }
}

function eventPulse() {
  if (state.eventTime == null
      || (Date.now() - state.eventTime) / 1000 > eventDuration()) {
    state.event = null; state.eventTime = null;
    cancelTimer("event");
  }
  redraw();
}

function closeHelp() { state.help = false; redraw(); }

const MSG_FINISHED = "The puzzle is finished.";

const currentDifficulty = () => state.difficulty || DEFAULT_DIFFICULTY;

// Guard for board-dereferencing commands: a mid-generation keypress is inert,
// and while the help overlay is up a game key just dismisses it.
function playingOnly() {
  if (state.help) { closeHelp(); return false; }
  if (state.armed) { message("Press n to begin."); return false; }
  if (state.generating) { message("Still generating a puzzle…"); return false; }
  return true;
}

// The elapsed time is read before the won flag flips: once set, elapsed()
// returns the frozen value.
function checkWin() {
  if (!state.won && E.boardSolved(state.board.cells, state.size)) {
    const el = elapsed();
    state.won = true; state.wonElapsed = el;
    setStatus(`Solved in ${fmtTime(state.wonElapsed)} -- nicely done`);
  }
}

const currentGivenP = () => givenP(state.board, state.cursor[0], state.cursor[1]);

function setCurrent(val) {
  if (currentGivenP()) {
    setStatus("That cell is a given -- it can't change.", "fixed");
  } else if (state.won || state.proven) {
    setStatus(MSG_FINISHED);
  } else {
    const [r, cc] = state.cursor;
    const i = r * state.size + cc;
    state.history.push([i, state.board.cells[i]]);
    state.board.cells[i] = val;
    setStatus("");
    checkWin();
  }
  redraw();
}

// While the help overlay is up, a movement key dismisses it instead of moving.
function move(dr, dc) {
  if (state.help) { closeHelp(); return; }
  const n = state.size;
  state.cursor = [
    Math.max(0, Math.min(n - 1, state.cursor[0] + dr)),
    Math.max(0, Math.min(n - 1, state.cursor[1] + dc)),
  ];
  if (!(state.won || state.proven)) state.status = "";
  redraw();
}

function cycle() {
  if (!playingOnly()) return;
  const v = boardRef(state.board, state.cursor[0], state.cursor[1]);
  setCurrent(v == null ? 0 : v === 0 ? 1 : null);
}

function undo() {
  if (!playingOnly()) return;
  if (state.won || state.proven) {
    setStatus(MSG_FINISHED);
  } else if (state.history.length === 0) {
    setStatus("Nothing to undo.", "nothing");
  } else {
    const [i, prev] = state.history.pop();
    const n = state.size;
    state.board.cells[i] = prev;
    state.cursor = [Math.floor(i / n), i % n];
    setStatus("");
  }
  redraw();
}

// Escalates automatically: a forced cell first, then a depth-1 hypothesis
// cell, and as a last resort a cell taken from the solution, labelled
// honestly at each tier.
function hint() {
  if (!playingOnly()) return;
  if (state.won || state.proven) {
    setStatus(MSG_FINISHED);
  } else {
    const found = E.nextHint(state.board.cells, state.size, state.solution);
    if (!found) {
      setStatus("No empty cell left to hint.", "no-hint");
    } else {
      state.cursor = [found[0], found[1]];
      setCurrent(found[2]);
      setStatus(found[3] === "forced" ? "Filled a forced cell."
        : found[3] === "hypothesis" ? "Hypothesis hint: only one colour survives here."
        : "No logic path found -- filled from the solution.", "hint");
    }
  }
  redraw();
}

function check() {
  if (!playingOnly()) return;
  checkWin();
  if (!state.won) {
    if (E.boardFull(state.board.cells))
      setStatus("The board is full but a rule is broken.", "invalid");
    else
      setStatus(`Not finished -- ${emptyCount()} cells left.`);
  }
  redraw();
}

function prove() {
  if (!playingOnly()) return;
  if (window.confirm("Show the full solution?")) {
    state.board.cells = state.solution.slice();
    // read the clock before the proven flag freezes elapsed()
    const el = elapsed();
    state.proven = true; state.wonElapsed = el;
    setStatus("Solution shown.");
    redraw();
  }
}

function reset() {
  if (!playingOnly()) return;
  const n = state.size;
  for (let r = 0; r < n; r++)
    for (let cc = 0; cc < n; cc++)
      if (!givenP(state.board, r, cc)) state.board.cells[r * n + cc] = null;
  state.won = false; state.proven = false; state.history = [];
  state.startTime = Date.now();
  state.coinSkin = COIN_SKINS[0];
  // the refresh tick cancels its timer at a win; a replay needs it back
  if (timers.refresh == null) startRefreshTimer();
  setStatus("");
  redraw();
}

function toggleAssist() {
  state.assist = !state.assist;
  setStatus(state.assist ? "Assist on -- rule breaks highlight." : "Assist off.");
  redraw();
}

// Mirror of takuzu-cycle-skin: turn the thumbwheel to the next coin skin.
function cycleSkinBy(step) {
  const n = COIN_SKINS.length;
  const pos = Math.max(0, COIN_SKINS.indexOf(state.coinSkin));
  state.coinSkin = COIN_SKINS[(pos + step + n) % n];
  setStatus(`Coin skin: ${state.coinSkin}.`);
  redraw();
}
const cycleSkin = () => cycleSkinBy(1);
const cycleSkinBack = () => cycleSkinBy(-1);

function help() {
  state.help = !state.help;
  redraw();
}

// Start the armed puzzle, or arm a fresh game (blank board, flashing New).
function newGame() {
  if (state.armed && state.pending) {
    beginPlay(state.pending);
  } else if (state.armed) {
    // not generated yet: show the spinner and start as soon as it arrives
    state.pendingStart = true; state.spinner = 0;
    state.generating = { size: state.armed.size, difficulty: state.armed.difficulty };
    cancelTimer("refresh");
    timers.spinner = setInterval(() => { state.spinner++; redraw(); }, 100);
    redraw();
  } else {
    arm(state.size, currentDifficulty());
  }
}

function cycleSize() {
  const i = SIZES.indexOf(state.size);
  const next = SIZES[((i < 0 ? 0 : i) + 1) % SIZES.length];
  arm(next, currentDifficulty());
}

// Mirror of takuzu--digit-size: 4, 6, and 8 pick their size directly; 1 lands
// on 10 first, then repeated presses toggle 10 and 12.  Deliberately
// unlabelled on the faceplate -- discoverable by feel, like the arrow keys.
function digitSize(key) {
  switch (key) {
    case "4": return 4;
    case "6": return 6;
    case "8": return 8;
    case "1": return state.size === 10 ? 12 : 10;
    default: return null;
  }
}

function jumpSize(key) {
  const size = digitSize(key);
  if (size != null) arm(size, currentDifficulty());
}

function cycleLevel() {
  const i = DIFFS.indexOf(currentDifficulty());
  const next = DIFFS[((i < 0 ? 0 : i) + 1) % DIFFS.length];
  arm(state.size, next);
}

// --- timers and game flow ---

// Cancels itself once the game is over: the clock is frozen, so the periodic
// redraw would only burn cycles.
function refreshTick() {
  if ((state.won || state.proven) && !state.armed) cancelTimer("refresh");
  else redraw();
}

function startRefreshTimer() {
  timers.refresh = setInterval(refreshTick, refreshInterval() * 1000);
}

function teardownTimers() {
  cancelTimer("refresh");
  cancelTimer("spinner");
  cancelTimer("event");
}

function resetPlayState() {
  state.pending = null; state.pendingStart = false; state.generating = null;
  state.cursor = [0, 0]; state.assist = false; state.history = [];
  state.won = false; state.proven = false; state.wonElapsed = 0;
  state.status = ""; state.event = null; state.help = false;
}

function beginPlay(result) {
  teardownTimers();
  resetPlayState();
  state.board = { size: result.size, cells: result.cells.slice(), givens: result.givens.slice() };
  state.solution = result.solution.slice();
  state.grade = result.grade;
  state.size = result.size;
  state.armed = null;
  state.startTime = Date.now();
  startRefreshTimer();
  redraw();
}

function onGenerated(result) {
  if (result == null) {
    cancelTimer("spinner");
    state.generating = null;
    setStatus("Generation failed -- press n to retry.", "gen-fail");
    redraw();
  } else if (state.pendingStart) {
    cancelTimer("spinner");
    beginPlay(result);
  } else {
    state.pending = result;
  }
}

// Time-sliced generation so the armed/generating faceplate stays live.
function generateAsync(size, difficulty, cb) {
  const token = ++genToken;
  let st = null;
  function step() {
    if (token !== genToken) return; // superseded by a re-arm
    try {
      if (st == null) st = E.makeCarve(size, difficulty);
      if (E.carveStep(st, 30)) { cb(E.carveResult(st)); return; }
    } catch (e) { cb(null); return; }
    setTimeout(step, 0);
  }
  setTimeout(step, 0);
}

// Open the game blank at size, ready to start on the New key.  The clock
// stays stopped and New flashes; the puzzle pre-generates so starting is instant.
function arm(size, difficulty) {
  teardownTimers();
  genToken++; // drop any in-flight generation
  resetPlayState();
  state.size = size;
  state.difficulty = difficulty;
  state.board = blankBoard(size);
  state.solution = null;
  state.grade = null;
  state.armed = { size, difficulty };
  state.startTime = null;
  startRefreshTimer();
  generateAsync(size, difficulty, onGenerated);
  redraw();
}

// --- keymap (mirror of takuzu-mode-map) ---

document.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const moves = {
    ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1],
  };
  if (moves[e.key]) { e.preventDefault(); move(...moves[e.key]); return; }
  switch (e.key) {
    case " ": e.preventDefault(); cycle(); return;
    case "u": undo(); return;
    case "?": hint(); return;
    case "c": check(); return;
    case "p": prove(); return;
    case "r": reset(); return;
    case "a": toggleAssist(); return;
    case "s": cycleSize(); return;
    case "l": cycleLevel(); return;
    case "n": newGame(); return;
    case "i": help(); return;
    case "q": message("Close the tab to quit."); return;
    case "w": cycleSkin(); return;
    case "W": cycleSkinBack(); return;
    case "1": case "4": case "6": case "8": jumpSize(e.key); return;
  }
});

window.addEventListener("resize", redraw);

// M-x takuzu opens armed at the defaults.
arm(DEFAULT_SIZE, DEFAULT_DIFFICULTY);

})();
</script>
</body>
</html>

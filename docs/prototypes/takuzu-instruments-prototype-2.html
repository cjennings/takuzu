<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Takuzu — Tubes + meters panel (full layout)</title>
<!-- The chosen "Tubes + meters" panel, laid out on a mock faceplate so the two
     new components (STATE jewels, EVENT annunciator) have a place. Board is a
     placeholder for scale. -->
<style>
:root{
  --ground:#151311; --panel:#100f0f; --well:#0a0c0d; --raise:#1a1917;
  --gold:#b99640; --gold-hi:#dcc061; --silver:#bfc4d0; --cream:#f3e7c5;
  --steel:#969385; --dim:#7c838a; --slate:#424f5e; --wash:#2c2f32;
  --pass:#74932f; --fail:#cb6b4d; --mono:ui-monospace,"Berkeley Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--mono);color:var(--silver);padding:34px 20px 60px;
  background:radial-gradient(1200px 600px at 60% -12%,#1d1914 0%,transparent 60%),var(--ground);
  display:flex;justify-content:center}
.plate{max-width:820px;width:100%;background:linear-gradient(180deg,#221e18,#151109);
  border:1px solid #2c2620;border-radius:16px;padding:26px 30px 24px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 34px 66px -22px rgba(0,0,0,.85)}
.head{color:var(--gold);font-size:1.5rem;font-weight:700;font-style:italic;letter-spacing:.14em}
.head span{color:var(--dim);font-size:.6rem;font-style:normal;letter-spacing:.24em;margin-left:12px}
.stage{display:flex;gap:16px;margin:20px 0 0;align-items:stretch}
.board{flex:1;display:grid;grid-template-columns:repeat(8,1fr);gap:6px;padding:14px;border-radius:12px;
  background:linear-gradient(180deg,#19150f,#100d09);box-shadow:inset 0 2px 12px rgba(0,0,0,.72)}
.cell{aspect-ratio:1;border-radius:8px;background:radial-gradient(circle at 50% 38%,#14110c,#090705);
  box-shadow:inset 0 2px 5px rgba(0,0,0,.85)}
.cell .d{width:60%;height:60%;border-radius:50%;margin:20% auto}
.d0{background:#4d5f75}.d1{background:#8f5236}

/* right instrument column */
.col{width:150px;background:var(--well);border:1px solid #201d17;border-radius:10px;
  padding:18px 10px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;box-shadow:inset 0 2px 9px rgba(0,0,0,.65)}
.slot{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}
.eng{color:var(--steel);font-size:.52rem;letter-spacing:.28em;text-transform:uppercase}

/* event annunciator strip under the stage */
.eventstrip{margin-top:14px;padding:11px 12px;background:var(--well);border:1px solid #201d17;border-radius:10px;
  display:flex;align-items:center;gap:12px}
.eventstrip .lbl{color:var(--steel);font-size:.52rem;letter-spacing:.28em;writing-mode:vertical-rl;transform:rotate(180deg)}
.annun{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;flex:1}
.acell{font-size:9px;font-weight:900;letter-spacing:.06em;text-align:center;color:var(--dim);padding:8px 4px;border-radius:3px;
  background:#141210;border:1px solid #262320;-webkit-text-stroke:.4px currentColor;paint-order:stroke fill}
/* momentary event: a slow, soft pulse — a gentle breathing glow, not a bright
   flash. Muted amber peak, low warm trough. Solid colours so it interpolates. */
.acell.on{font-weight:700;animation:evpulse 2.8s ease-in-out infinite}
@keyframes evpulse{
  0%,100%{background-color:#241d13;color:var(--steel);box-shadow:0 0 3px rgba(185,150,64,.2)}
  50%{background-color:#a8843a;color:#1c1710;box-shadow:0 0 8px rgba(200,160,75,.4)}
}

/* ---- widgets ---- */
.nixie{display:inline-flex;gap:4px;align-items:center}
.nixie .tube{width:24px;height:38px;border-radius:5px;position:relative;overflow:hidden;
  background:radial-gradient(circle at 50% 38%,#241a12,#0b0807);border:1px solid #2c261d;display:grid;place-items:center;box-shadow:inset 0 0 12px rgba(0,0,0,.6)}
.nixie .tube b{font-size:21px;color:#ff9a3c;text-shadow:0 0 6px rgba(255,140,50,.85),0 0 15px rgba(255,120,40,.45)}
.nixie .tube.off b{color:#3a2a1c;text-shadow:none}
.nixie .tube::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent 32%)}
.nixie .colon{color:#ff9a3c;font-size:16px;text-shadow:0 0 6px rgba(255,140,50,.8)}

.rotsel{position:relative;width:120px;height:70px}
.knob{width:46px;height:46px;border-radius:50%;position:absolute;left:50%;top:18px;margin-left:-23px;
  background:radial-gradient(circle at 40% 35%,#2a2622,#141210);border:1px solid #3a352c;box-shadow:inset 0 2px 3px rgba(255,255,255,.05),0 3px 6px rgba(0,0,0,.5)}
.knob .ind{position:absolute;left:50%;top:5px;width:2px;height:14px;background:var(--gold-hi);margin-left:-1px;transform-origin:50% 18px;border-radius:1px;box-shadow:0 0 5px rgba(220,192,97,.7)}
.rotsel .pos{position:absolute;font-size:8.5px;color:var(--dim);transform:translate(-50%,-50%);letter-spacing:.02em}
.rotsel .pos.on{color:var(--gold-hi);text-shadow:0 0 6px rgba(220,192,97,.55)}

.gauge{width:96px}
.gauge .dial{position:relative;height:46px;overflow:hidden}
.gauge .arc{position:absolute;inset:0 0 -46px 0;border:2px solid var(--wash);border-radius:50%}
.gauge .tk{position:absolute;left:50%;bottom:0;width:1.5px;height:7px;background:var(--steel);transform-origin:50% 46px}
.gauge .ndl{position:absolute;left:50%;bottom:0;width:2px;height:39px;background:var(--gold-hi);transform-origin:50% 100%;border-radius:2px;box-shadow:0 0 6px rgba(220,192,97,.5)}
.gauge .hub{position:absolute;left:50%;bottom:-4px;width:8px;height:8px;margin-left:-4px;border-radius:50%;background:var(--gold)}
.gauge .gv{color:var(--cream);text-align:center;font-size:12px;font-weight:700;margin-top:3px}

/* state jewels */
.stateframe{position:relative;width:100%;margin-top:6px;border:1px solid var(--wash);border-radius:8px;
  padding:13px 8px 12px 30px;display:flex;flex-direction:column;justify-content:space-between;min-height:134px}
.stateframe .lbl{position:absolute;top:-7px;left:50%;transform:translateX(-50%);background:var(--well);padding:0 7px;
  color:var(--steel);font-size:.52rem;letter-spacing:.28em;text-transform:uppercase}
.jw{display:flex;align-items:center;gap:9px;width:100%}
.jw .l{color:var(--steel);font-size:.56rem;letter-spacing:.12em}
.jw .l.on{color:var(--cream)}
.jewel{width:15px;height:15px;border-radius:50%;position:relative;flex:none;
  background:radial-gradient(circle at 36% 30%,rgba(255,255,255,.75),var(--jc) 42%,#3a0d08 100%);box-shadow:0 0 9px 1px var(--jc),inset 0 -2px 3px rgba(0,0,0,.5)}
.jewel.dim{background:radial-gradient(circle at 36% 30%,rgba(120,120,120,.25),#241f1b 55%,#0e0c0a);box-shadow:inset 0 -2px 3px rgba(0,0,0,.5)}
</style>
</head>
<body>
<main class="plate">
  <div class="head">TAKUZU<span>BINAIRO · BINARY LOGIC</span></div>

  <div class="stage">
    <div class="board" id="board"></div>
    <div class="col">
      <div class="slot"><span class="eng">Time</span><span class="nixie" id="ntime"></span></div>
      <div class="slot"><span class="eng">Size</span><span class="nixie" id="nsize"></span></div>
      <div class="slot"><span class="eng">Level</span><div class="rotsel" id="level"></div></div>
      <div class="slot"><span class="eng">Left</span><div class="gauge" id="left"></div></div>
      <div class="slot"><div class="stateframe" id="states"><span class="lbl">State</span></div></div>
    </div>
  </div>

  <div class="eventstrip">
    <span class="lbl">Event</span>
    <div class="annun" id="events"></div>
  </div>
</main>

<script>
"use strict";
const $=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
// board placeholder
const b=document.getElementById('board');
const fill=[[0,3,'0'],[1,'1'],[8,'1'],[10,'0'],[19,'0'],[27,'1'],[33,'0'],[5,'1'],[6,'1']];
for(let i=0;i<64;i++){const c=$('div','cell');
  if([0,1,5,6,10,19,27,33,40].includes(i)){const d=$('div','d '+(i%2?'d1':'d0'));c.appendChild(d);}
  b.appendChild(c);}
// nixie
function nixie(host,str){host.innerHTML='';for(const ch of str){
  if(ch===':'){const c=$('span','colon');c.textContent=':';host.appendChild(c);continue;}
  const t=$('span','tube'+(ch===' '?' off':''));const bb=$('b');bb.textContent=ch===' '?'0':ch;t.appendChild(bb);host.appendChild(t);}}
nixie(document.getElementById('ntime'),'1:23');
nixie(document.getElementById('nsize'),' 8');
// rotary level
(()=>{const r=document.getElementById('level');const k=$('div','knob');const ind=$('div','ind');k.appendChild(ind);r.appendChild(k);
  const labs=['EASY','MED','HARD'],ang=[-42,0,42],active=1;
  labs.forEach((t,i)=>{const p=$('span','pos'+(i===active?' on':''));p.textContent=t;
    const a=(ang[i]-90)*Math.PI/180;p.style.left=(60+42*Math.cos(a))+'px';p.style.top=(42+32*Math.sin(a))+'px';r.appendChild(p);});
  ind.style.transform='rotate('+ang[active]+'deg)';})();
// needle left
(()=>{const g=document.getElementById('left');const d=$('div','dial');const arc=$('div','arc');d.appendChild(arc);
  for(let i=0;i<=6;i++){const tk=$('div','tk');tk.style.transform='rotate('+(-90+i*30)+'deg)';d.appendChild(tk);}
  const n=$('div','ndl');n.style.transform='rotate('+(-90+75/100*180)+'deg)';d.appendChild(n);
  d.appendChild($('div','hub'));g.appendChild(d);const gv=$('div','gv');gv.textContent='27';g.appendChild(gv);})();
// state jewels: SOLVING lit, ASSIST lit
(()=>{const s=document.getElementById('states');
  const rows=[['READY','#6fce33',0],['SOLVING','#ffb43a',1],['SOLVED','#6fce33',0],['SHOWN','#ff5b45',0],['ASSIST','#63e6c8',1]];
  rows.forEach(([lab,col,on])=>{const w=$('div','jw');const j=$('span','jewel'+(on?'':' dim'));j.style.setProperty('--jc',col);
    const l=$('span','l'+(on?' on':''));l.textContent=lab;w.append(j,l);s.appendChild(w);});})();
// event annunciator: HINT flashing
(()=>{const e=document.getElementById('events');
  ['FIXED','HINT','NO HINT','INVALID','NOTHING','GEN FAIL'].forEach((t,i)=>{const c=$('span','acell'+(i===1?' on':''));c.textContent=t;e.appendChild(c);});})();
</script>
</body>
</html>
